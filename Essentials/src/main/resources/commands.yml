# EssentialsY Command Configuration
# Fine-grained control over which commands are available.
#
# Three ways to disable commands:
#   1. List individual commands under 'disabled'
#   2. Set a category's 'enabled' to false to disable all commands in that category
#   3. Use core.yml 'disabled-commands' for legacy compatibility
#
# Changes take effect after /essentials reload

# Individual commands to disable (case-insensitive)
disabled:
  # - god
  # - fly
  # - antioch

# Disable entire command categories at once
categories:
  teleport:
    enabled: true
    commands:
      - home
      - sethome
      - delhome
      - homes
      - spawn
      - setspawn
      - tp
      - tpa
      - tpaccept
      - tpdeny
      - tpahere
      - tpall
      - tpauto
      - tphere
      - tpohere
      - tppos
      - warp
      - setwarp
      - delwarp
      - warps
      - back
      - jump
      - top
      - bottom
      - rtp

  economy:
