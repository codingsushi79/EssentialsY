name: Build EssentialsY

on:
  push:
    branches:
      - main
      - master
      - 2.x
      - dev/*
  release:
    types:
      - published

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :EssentialsY:build -x test --stacktrace

      - name: Archive plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY plugin jar
          path: jars/

      - name: Upload EssentialsY jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY
          path: jars/EssentialsY-*.jar
          archive: false

      - name: Resolve release version
        if: github.event_name == 'release'
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: github.event_name == 'release'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT_ID }}
          name: ${{ github.event.release.name }}
          version: ${{ steps.release.outputs.version }}
          changelog: ${{ github.event.release.body }}
          loaders: |-
            paper
            spigot
            bukkit
          game-versions: |-
            1.13
            1.14
            1.15
            1.16
            1.17
            1.18
            1.19
            1.20
            1.20.x
            1.21
            1.21.x
          files: jars/EssentialsY-*.jar
