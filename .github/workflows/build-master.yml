name: Build EssentialsY

on:
  push:
    branches:
      - main
      - master
      - 2.x
      - dev/*

permissions:
  contents: write

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve project version
        id: version
        run: |
          RAW_VERSION=$(grep -E '^version\s*=' build.gradle | sed 's/.*"\([^"]*\)"$/\1/')
          VERSION="${RAW_VERSION%-SNAPSHOT}"
          TAG="v${VERSION}"

          if [[ "${{ github.ref_name }}" =~ ^dev/ ]]; then
            SHOULD_RELEASE=false
          elif git rev-parse "${TAG}^{tag}" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          echo "raw-version=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should-release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_RELEASE" = "true" ]; then
            echo "New version ${VERSION} — will create release ${TAG}"
          else
            echo "No new release for version ${VERSION}"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          if [ "${{ steps.version.outputs.should-release }}" = "true" ]; then
            ./gradlew :EssentialsY:build -x test --stacktrace -PreleaseVersion="${{ steps.version.outputs.version }}"
          else
            ./gradlew :EssentialsY:build -x test --stacktrace
          fi

      - name: Resolve plugin jar
        id: jar
        run: |
          if [ "${{ steps.version.outputs.should-release }}" = "true" ]; then
            JAR_PATH="jars/EssentialsY-${{ steps.version.outputs.version }}.jar"
          else
            shopt -s nullglob
            jars=(jars/EssentialsY-*.jar)
            if [ ${#jars[@]} -eq 0 ]; then
              echo "::error::No EssentialsY jar found in jars/"
              ls -la jars/ || true
              exit 1
            fi
            if [ ${#jars[@]} -gt 1 ]; then
              echo "::error::Multiple EssentialsY jars found: ${jars[*]}"
              exit 1
            fi
            JAR_PATH="${jars[0]}"
          fi

          if [ ! -f "$JAR_PATH" ]; then
            echo "::error::Expected jar not found: $JAR_PATH"
            ls -la jars/ || true
            exit 1
          fi
          echo "path=${JAR_PATH}" >> "$GITHUB_OUTPUT"

      - name: Archive plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY plugin jar
          path: jars/

      - name: Upload EssentialsY jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY
          path: ${{ steps.jar.outputs.path }}
          archive: false

      - name: Create GitHub release
        if: steps.version.outputs.should-release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}

      - name: Resolve Modrinth project
        if: steps.version.outputs.should-release == 'true'
        id: modrinth
        run: |
          PROJECT_ID=$(curl -fsSL "https://api.modrinth.com/v2/project/essentials_y/check" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "project-id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: steps.version.outputs.should-release == 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ steps.modrinth.outputs.project-id }}
          name: ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.version }}
          changelog: Automated release for ${{ steps.version.outputs.tag }}
          channel: release
          loaders: |-
            paper
            spigot
            bukkit
          game-versions: |-
            1.13
            1.14
            1.15
            1.16
            1.17
            1.18
            1.19
            1.20.x
            1.21.x
          files: ${{ steps.jar.outputs.path }}
