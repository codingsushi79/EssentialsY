name: Build EssentialsY

on:
  push:
    branches:
      - main
      - master
      - 2.x
      - dev/*

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :EssentialsY:build -x test --stacktrace

      - name: Resolve plugin jar
        id: jar
        run: |
          shopt -s nullglob
          jars=(jars/EssentialsY-*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "::error::No EssentialsY jar found in jars/"
            ls -la jars/ || true
            exit 1
          fi
          if [ ${#jars[@]} -gt 1 ]; then
            echo "::error::Multiple EssentialsY jars found: ${jars[*]}"
            exit 1
          fi
          echo "path=${jars[0]}" >> "$GITHUB_OUTPUT"

      - name: Archive plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY plugin jar
          path: jars/

      - name: Upload EssentialsY jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY
          path: ${{ steps.jar.outputs.path }}
          archive: false
