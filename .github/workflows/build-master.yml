name: Build EssentialsY

on:
  push:
    branches:
      - main
      - master
      - 2.x
      - dev/*
  release:
    types:
      - published

jobs:
  build:
    name: Build and upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :EssentialsY:build --stacktrace

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/test*/TEST-*.xml'

      - name: Archive plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY plugin jar
          path: jars/

      - name: Upload EssentialsY jar
        uses: actions/upload-artifact@v7
        with:
          name: EssentialsY
          path: jars/EssentialsY-*.jar
          archive: false

      - name: Prepare Javadocs
        run: |
          mv Essentials/build/docs/javadoc/ javadocs/ || mkdir -p javadocs

      - name: Archive Javadocs
        uses: actions/upload-artifact@v7
        with:
          name: javadocs
          path: javadocs/

  publish-jd:
    name: Publish Javadocs
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/2.x')
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Javadocs
        uses: actions/download-artifact@v8
        with:
          name: javadocs
          path: javadocs/

      - name: Deploy Javadocs
        if: ${{ secrets.NETLIFY_JD_AUTH_TOKEN != '' }}
        run: npx netlify-cli deploy --dir=javadocs/ --prod --message="EssentialsY GitHub Actions deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_JD_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_JD_SITE_ID }}
